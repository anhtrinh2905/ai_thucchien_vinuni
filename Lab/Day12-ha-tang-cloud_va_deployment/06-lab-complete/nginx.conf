events { worker_connections 256; }

http {
    # Docker DNS — resolve at request time (agent có thể chưa up khi nginx start)
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;

        set $agent_upstream agent:8000;

        location / {
            proxy_pass http://$agent_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-API-Key $http_x_api_key;
            proxy_next_upstream error timeout http_503;
            proxy_next_upstream_tries 3;
        }

        location /health {
            proxy_pass http://$agent_upstream/health;
            access_log off;
        }

        location /ready {
            proxy_pass http://$agent_upstream/ready;
            access_log off;
        }
    }
}
